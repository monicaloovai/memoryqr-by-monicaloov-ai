<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryQR by MonicaLoov.ai</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#F8F5F0;
      color:#222;
    }

    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      background:white;
      padding:20px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 2px 15px rgba(0,0,0,.08);
      z-index:999;
    }

    .logo{
      font-size:30px;
      font-weight:bold;
    }

    .logo span{
      display:block;
      font-size:13px;
      color:#9c7b47;
      font-weight:400;
    }

    nav a{
      text-decoration:none;
      color:#222;
      margin-left:30px;
      font-weight:600;
    }

    .hero{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:linear-gradient(rgba(255,255,255,.4),rgba(255,255,255,.4)),
      url("https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1800&q=80") center/cover;
    }

    .hero h1{
      font-size:70px;
      font-family:Georgia,serif;
      margin-bottom:20px;
    }

    .hero p{
      font-size:24px;
      margin-bottom:40px;
    }

    .button{
      display:inline-block;
      padding:18px 45px;
      background:black;
      color:white;
      text-decoration:none;
      border-radius:50px;
      font-size:18px;
    }

    section{
      padding:100px 10%;
    }

    h2{
      font-size:45px;
      text-align:center;
      margin-bottom:50px;
      font-family:Georgia,serif;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
    }

    .card{
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card h3{
      padding:20px;
      text-align:center;
    }

    footer{
      background:black;
      color:white;
      text-align:center;
      padding:50px;
    }

  </style>

</head>

<body>

<header>

<div class="logo">
MemoryQR
<span>by MonicaLoov.ai</span>
</div>

<nav>
<a href="#">Hem</a>
<a href="#">Event</a>
<a href="#">Kontakt</a>
</nav>

</header>

<section class="hero">

<div>

<h1>Every moment deserves<br>to be remembered.</h1>

<p>Exklusiva QR-gallerier för livets största ögonblick.</p>

<a class="button" href="#">
Skapa ditt event
</a>

</div>

</section>

<section>

<h2>Passar alla typer av event</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1200&q=80">
<h3>Bröllop</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?auto=format&fit=crop&w=1200&q=80">
<h3>Födelsedag</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=1200&q=80">
<h3>Baby Shower</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1200&q=80">
<h3>Företagsevent</h3>
</div>

</div>

</section>

<footer>

<h2>MemoryQR</h2>

<p>by MonicaLoov.ai</p>

</footer>

</body>
</html>
